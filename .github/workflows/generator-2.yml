  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div style="max-width: 800px; margin: 4rem auto; padding: 1rem; text-align: center;">
    <h1>Page not found</h1>
    <p>
      We couldn’t find the page you requested.
    </p>
    <p>
      You will be redirected to the <a href="/booking.com/">Hotel Deals home page</a> in a few seconds.
    </p>
    <p>
      If your browser doesn’t redirect automatically, <a href="/booking.com/">click here</a>.
    </p>
  </div>
</body>
</html>
git add .github/workflows/generator-2.yml generator-loop-2.js update-index.js 404.html index.html styles.css
git commit -m "one‑shot deploy: hotel generator, index/sitemap, 404 redirect, clear workflow name"
git push origin main

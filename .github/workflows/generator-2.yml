name: "Hotel Deals – Auto‑Generator (Stream 2)"

on:
  schedule:
    - cron: "0 6 * * *"   # 6:00 UTC every day
  workflow_dispatch:

jobs:
  generate_pages:
    runs-on: ubuntu-latest
    env:
      AI1_KEY: ${{ secrets.AI1_KEY }}
      AI2_KEY: ${{ secrets.AI2_KEY }}
      AI3_KEY: ${{ secrets.AI3_KEY }}
      AI4_KEY: ${{ secrets.AI4_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install node-fetch@2 dotenv --no-package-lock

      - name: Create src dir if needed (Stream 2)
        run: |
          mkdir -p src
          cat > src/cities-2.json << 'EOF'
[
  { "city": "Kuala Lumpur", "country": "Malaysia" },
  { "city": "Langkawi", "country": "Malaysia" },
  { "city": "Riyadh", "country": "Saudi Arabia" },
  { "city": "Jeddah", "country": "Saudi Arabia" },
  { "city": "Singapore", "country": "Singapore" }
]
EOF

      - name: Run second generator (set‑and‑forget loop)
        run: node generator-loop-2.js

      - name: Commit new pages (Stream 2)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A .
          git commit -m "Auto‑gen hotels (Stream 2): $(date)" || echo "No changes"
          git push

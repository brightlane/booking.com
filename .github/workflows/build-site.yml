name: Build Booking.com site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # 3. Install dependencies (creates package-lock.json)
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "❌ ERROR: package.json NOT FOUND"
            exit 1
          fi

      # 4. IMPORTANT: Make sure generate-site-files.js exists first
      - name: Verify generate-site-files.js
        run: |
          if [ -f "generate-site-files.js" ]; then
            echo "✅ generate-site-files.js found"
          else
            echo "❌ generate-site-files.js NOT FOUND in repo root"
            exit 1
          fi

      # 5. Run generator
      - name: Generate 2000+ hotel pages
        run: |
          node generate-site-files.js

      # 6. Commit and push generated HTML files
      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          git add ./*.html
          git add generate-site-files.js
          git add package.json
          git add package-lock.json

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "✅ Autogenerate 2000+ SEO hotel pages
            - Runs node generate-site-files.js on every push to main."
            git push origin main
          else
            echo "No changes to commit."
          fi

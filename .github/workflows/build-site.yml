name: Daily Generate 2000 Pages

on:
  schedule:
    # Run every day at 02:00 UTC (you can change this)
    - cron: "0 2 * * *"
  # Allow manual run from GitHub UI
  workflow_dispatch:

jobs:
  generate-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm install fs-extra

      - name: Run one‑file generator
        run: |
          node one-file-everything.js

      - name: Commit and push generated pages (optional)
        # Only if you want GitHub to push the output back to the repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add output/
          git diff --cached --quiet || git commit -m "Generated 2000 pages $(date)"
          git push origin HEAD

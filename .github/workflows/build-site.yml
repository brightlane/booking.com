name: Build and deploy GitHub Pages site

on:
  page_build:
    types: [created]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  build-site:
    name: Build and deploy site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install

      - name: Build static site (example)
        run: |
          echo "Build step only; no sitemap logic here"

      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          echo "Deploying from main to GitHub Pages (no pages-deploy)"

name: Daily Generate 2000 Pages

on:
  schedule:
    # Run every day at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  generate-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run one‑file generator
        run: |
          node one-file-everything.js

      - name: Commit generated pages back to repo (optional)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add output/
          git diff --cached --quiet || git commit -m "Generated 2000 pages $(date)"
          git push origin HEAD

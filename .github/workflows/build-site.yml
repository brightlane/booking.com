name: Build Booking.com site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Set up Node.js (v20, no cache = no lock file warning)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Install dependencies (optional but cleans up environment)
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "No package.json; skipping install (this is fine for pure scripts)."
          fi

      # 4. Check if generate-site-files.js exists before running
      - name: Verify generate-site-files.js
        run: |
          if [ -f "generate-site-files.js" ]; then
            echo "✅ generate-site-files.js found in repo root."
          else
            echo "❌ generate-site-files.js NOT FOUND. Please upload it to the root of the repo and push again."
            exit 1
          fi

      # 5. Run the generator: 2000+ pages
      - name: Generate 2000+ hotel pages
        run: |
          node generate-site-files.js

      # 6. Commit and push generated HTML files
      - name: Commit and push changes
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"

          # Add all generated HTML files and the generator
          git add ./*.html
          git add generate-site-files.js

          # If there are changes, commit and push
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "✅ Autogenerate 2000+ SEO hotel pages from generate-site-files.js
            - Booking.com + Skyscanner affiliate links preserved.
            - Cross‑linked, schema‑enhanced worldwide hotel pages.
            - Runs on every push to main."
            git push origin main
          else
            echo "No changes to commit; site is already up to date."
          fi

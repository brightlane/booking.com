name: Generate pages daemon (self‑trigger)

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  page_build:
    types: [created]

permissions:
  contents: write
  pages: write

jobs:
  generate-pages-daemon:
    name: Generate hotel pages + dynamic sitemap
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install --save-dev fs-extra

      - name: Run generate-pages-daemon for up to 6 hours
        run: |
          node generate-pages-daemon.js &
          DAEMON_PID=$!
          timeout 355m /bin/bash -c 'wait $DAEMON_PID || true'
          sleep 10

      - name: Generate sitemap from generated pages
        run: |
          node generate-sitemap.js

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add output/ sitemap.xml
          git commit -m "Autogenerate pages + sitemap (self‑trigger daemon)" || echo "No changes"
          git push origin main
